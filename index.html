<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="cristopherpydev">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <title>WebFetch Explorer</title>
</head>
<script src="./script.js"></script>

<body>
    <div class="container p-5 my-5 bg-dark text-white">
        <h1>WebFetch Explorer</h1>
        <p>Your helper to Fetch over APIs</p>
        <div class="card p-5">
            <h1>Place your endpoint</h1>
            <div class="d-flex gap-2">
                <input type="text" placeholder="i.e: https://api.sampleapis.com/futurama/characters" class="form-control" id="api-uri" oninput="reset()">
                <input type="button" value="Fetch" class="btn btn-success" onclick="btnFetch()">
            </div>
        </div>
        <div class="apicard card p-5 my-5">
            <div class="inside card glass-success p-2">
                <div class="d-flex gap-2">
                    <span class="response badge text-bg-primary" id="api-result"></span>
                    <span class="response badge text-bg-info" id="time"></span>
                </div>
                <p id="api-content" class="text-black p-5"></p>
                <button class="jsonbtn btn btn-success" onclick="downloadJSONFile()"><i class="bi bi-filetype-json"></i></button>
            </div>
        </div>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>>
